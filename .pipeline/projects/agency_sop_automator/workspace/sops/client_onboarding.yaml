# Sample SOP: Client Onboarding

name: client_onboarding
description: >
  Automates the client onboarding process for a digital agency.
  Takes client details and produces a complete onboarding package.

output_format: yaml

inputs:
  - name: client_name
    type: string
    description: Name of the client
    required: true
  - name: service_type
    type: string
    description: Type of service (e.g., web_design, seo, social_media)
    required: true
  - name: budget
    type: number
    description: Project budget in USD
    required: true
  - name: timeline_weeks
    type: number
    description: Expected timeline in weeks
    required: false

steps:
  - name: generate_project_plan
    description: Create a project plan based on service type and budget
    prompt_template: default_step
    output_key: project_plan
    required_inputs:
      - client_name
      - service_type
      - budget
      - timeline_weeks

  - name: create_timeline
    description: Generate a project timeline with milestones
    prompt_template: default_step
    output_key: timeline
    required_inputs:
      - client_name
      - service_type
      - timeline_weeks

  - name: prepare_proposal
    description: Draft a client proposal document
    prompt_template: default_step
    output_key: proposal
    required_inputs:
      - client_name
      - service_type
      - budget
      - project_plan
