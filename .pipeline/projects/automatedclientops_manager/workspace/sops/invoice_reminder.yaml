name: invoice_reminder
description: >
  SOP for sending invoice reminders to clients.
inputs:
  - name: client_email
    type: string
    required: true
    description: Client's email address
  - name: client_name
    type: string
    required: true
    description: Client's name
  - name: invoice_id
    type: string
    required: true
    description: Invoice ID to remind about
  - name: amount
    type: number
    required: true
    description: Invoice amount
  - name: days_overdue
    type: number
    required: false
    description: Number of days overdue
steps:
  - name: compose_reminder
    action: send_email
    params:
      to: "{{ client_email }}"
      subject: "Payment Reminder: Invoice {{ invoice_id }}"
      body: |
        Dear {{ client_name }},

        This is a friendly reminder that invoice {{ invoice_id }}
        for ${{ amount }} is {{ 'overdue by {} days'.format(days_overdue) if days_overdue else 'due soon' }}.

        Please process payment at your earliest convenience.

        Best regards,
        AutomatedClientOps Manager
      attachments: []
    description: Send invoice reminder email
  - name: log_reminder
    action: log
    params:
      message: "Invoice reminder sent for {{ invoice_id }} to {{ client_email }}"
      level: info
    description: Log reminder sent
