name: standard_onboarding
description: >
  Standard client onboarding SOP. Adds client, creates invoice,
  sends invoice email, and prepares for file delivery.
inputs:
  - name: client_id
    type: string
    required: true
    description: Unique client identifier
  - name: client_name
    type: string
    required: true
    description: Client's full name
  - name: client_email
    type: string
    required: true
    description: Client's email address
  - name: project_name
    type: string
    required: true
    description: Name of the project
  - name: invoice_items
    type: array
    required: false
    description: List of invoice items (each with description, quantity, unit_price)
  - name: deliverables
    type: array
    required: false
    description: List of deliverable file paths
steps:
  - name: add_client
    action: set_context
    params:
      client_id: "{{ client_id }}"
      client_name: "{{ client_name }}"
      client_email: "{{ client_email }}"
      project_name: "{{ project_name }}"
    description: Store client details in context
  - name: create_invoice
    action: generate_invoice
    params:
      invoice_id: "INV-{{ client_id }}-001"
      client_id: "{{ client_id }}"
      items: "{{ invoice_items }}"
      notes: "Initial invoice for {{ project_name }}"
    description: Create initial invoice
  - name: send_invoice
    action: send_email
    params:
      to: "{{ client_email }}"
      subject: "Invoice {{ client_id }} — Ready for Review"
      body: |
        Dear {{ client_name }},

        Your invoice is ready for review.

        Best regards,
        AutomatedClientOps Manager
      attachments: []
    description: Send invoice notification email
  - name: log_completion
    action: log
    params:
      message: "Onboarding completed for {{ client_name }} ({{ client_id }})"
      level: info
    description: Log onboarding completion
