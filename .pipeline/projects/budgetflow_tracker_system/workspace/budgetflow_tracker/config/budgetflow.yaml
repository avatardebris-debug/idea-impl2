# BudgetFlow Tracker Configuration

database:
  path: data/budgetflow_tracker.db
  journal_mode: WAL

import:
  default_bank_format: null
  date_formats:
    - "%Y-%m-%d"
    - "%m/%d/%Y"
    - "%d-%b-%Y"
    - "%b %d, %Y"
  amount_decimal_places: 2

categorization:
  default_confidence_threshold: 0.5
  max_rules_per_transaction: 10

budget:
  default_period: monthly
  rollover_enabled: true

ui:
  default_date_range_days: 30
  color_theme: default
