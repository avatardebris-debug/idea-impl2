[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "budgetflow-tracker"
version = "0.1.0"
description = "Local-first personal finance application with auto-categorization, budgeting, and cash flow forecasting."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.scripts]
budgetflow = "budgetflow_tracker.src.ui.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["budgetflow_tracker*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
