# Pipeline with join: sales joined with customers
sources:
  sales: sales.csv
  customers: customers.csv

steps:
  - id: filter_2024
    type: filter
    predicate: "year == '2024'"

  - id: select_cols
    type: select
    columns: [id, region, revenue]

  - id: agg_by_region
    type: aggregate
    group_by: [region]
    aggregations:
      revenue: sum

sinks:
  - type: csv
    path: /tmp/test_join_pipeline_output.csv
