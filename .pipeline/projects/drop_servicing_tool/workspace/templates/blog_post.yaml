name: blog_post
description: Generate a complete blog post from a topic
inputs:
  - name: topic
    type: string
    required: true
    description: The main topic of the blog post
  - name: tone
    type: string
    required: false
    description: Tone of the blog post (professional, casual, humorous, etc.)
    default: professional
  - name: word_count
    type: integer
    required: false
    description: Target word count
    default: 1000
steps:
  - name: research
    description: Research the topic and identify key points, angles, and supporting facts.
    prompt_template: default_step
    llm_required: true
  - name: outline
    description: Create a structured outline from the research with section headings.
    prompt_template: default_step
    llm_required: true
  - name: draft
    description: Write the full blog post draft based on the outline.
    prompt_template: default_step
    llm_required: true
  - name: title_options
    description: Generate 5 compelling title options for the post.
    prompt_template: default_step
    llm_required: true
  - name: edit
    description: Review and edit the draft for clarity, grammar, and flow.
    prompt_template: default_step
    llm_required: true
output_format: A complete blog post with title, outline, and full draft
agent_mode: balanced
