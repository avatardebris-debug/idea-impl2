name: email_sequence
description: Generate a multi-email marketing sequence
inputs:
  - name: audience
    type: string
    required: true
    description: Description of the target audience
  - name: product_service
    type: string
    required: true
    description: The product or service being promoted
  - name: num_emails
    type: integer
    required: false
    description: Number of emails in the sequence
    default: 5
  - name: goal
    type: string
    required: false
    description: The primary goal (purchase, signup, webinar, etc.)
    default: purchase
steps:
  - name: hooks
    description: Generate compelling subject lines and opening hooks for each email.
    prompt_template: default_step
    llm_required: true
  - name: sequence
    description: Write the full email sequence with body copy and call-to-action for each email.
    prompt_template: default_step
    llm_required: true
  - name: personalization_vars
    description: Identify personalization variables and dynamic content opportunities.
    prompt_template: default_step
    llm_required: true
  - name: a_b_tests
    description: Generate A/B test variations for subject lines and CTAs.
    prompt_template: default_step
    llm_required: true
output_format: Complete email sequence with subject lines, body copy, CTAs, and A/B test options
agent_mode: quality
