name: product_description
description: Generate product descriptions and SEO metadata for e-commerce
inputs:
  - name: product_name
    type: string
    required: true
    description: The product name
  - name: product_details
    type: string
    required: true
    description: Product specifications, features, and materials
  - name: target_audience
    type: string
    required: false
    description: Target audience description
    default: general
steps:
  - name: benefits
    description: Identify key product benefits and unique selling points.
    prompt_template: default_step
    llm_required: true
  - name: description_short
    description: Generate a short product description (for listings/catalogs).
    prompt_template: default_step
    llm_required: true
  - name: description_long
    description: Generate a detailed product description (for product pages).
    prompt_template: default_step
    llm_required: true
  - name: seo_meta
    description: Generate SEO metadata including title, description, and keywords.
    prompt_template: default_step
    llm_required: true
output_format: Product descriptions at multiple lengths with SEO metadata
agent_mode: balanced
