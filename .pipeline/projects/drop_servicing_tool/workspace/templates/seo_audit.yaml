name: seo_audit
description: Perform a comprehensive SEO audit for a URL
inputs:
  - name: url
    type: string
    required: true
    description: The URL to audit
  - name: focus_keywords
    type: string
    required: false
    description: Comma-separated list of focus keywords
    default: ""
steps:
  - name: crawl
    description: Crawl the URL and extract page structure, meta tags, headings, and content.
    prompt_template: default_step
    llm_required: true
  - name: analyze
    description: Analyze the crawl data for SEO issues including meta tags, headings, content quality, and internal linking.
    prompt_template: default_step
    llm_required: true
  - name: report
    description: Generate a comprehensive SEO audit report with findings and severity ratings.
    prompt_template: default_step
    llm_required: true
  - name: recommendations
    description: Generate prioritized recommendations to fix identified SEO issues.
    prompt_template: default_step
    llm_required: true
output_format: SEO audit report with findings and prioritized recommendations
agent_mode: quality
