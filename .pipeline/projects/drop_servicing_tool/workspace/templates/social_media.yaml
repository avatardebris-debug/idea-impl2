name: social_media
description: Generate platform-specific social media content from a topic
inputs:
  - name: topic
    type: string
    required: true
    description: The main topic for social media content
  - name: platforms
    type: string
    required: false
    description: Comma-separated list of platforms (twitter, linkedin, instagram, facebook)
    default: twitter,linkedin,instagram
  - name: brand_voice
    type: string
    required: false
    description: Brand voice/tone for the content
    default: professional
steps:
  - name: platform_strategy
    description: Determine the optimal content strategy for each platform based on the topic.
    prompt_template: default_step
    llm_required: true
  - name: content_generation
    description: Generate platform-specific content including captions, hashtags, and media suggestions.
    prompt_template: default_step
    llm_required: true
  - name: hashtags
    description: Generate relevant hashtags for each platform.
    prompt_template: default_step
    llm_required: true
  - name: scheduling_data
    description: Generate optimal posting times and scheduling recommendations.
    prompt_template: default_step
    llm_required: true
output_format: Platform-specific social media content with hashtags and scheduling data
agent_mode: fast
