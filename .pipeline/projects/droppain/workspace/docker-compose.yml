version: "3.9"

services:
  droppain:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./workspace:/app/workspace
    command: ["health"]

  shopify-mock:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./mock-shopify:/usr/share/nginx/html
    command: ["nginx", "-g", "daemon off;"]
