<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Shopify Store</title>
    <link rel="stylesheet" href="https://cdn.shopify.com/static/fonts.css">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Test Product 1",
        "offers": {
            "@type": "Offer",
            "price": "29.99",
            "priceCurrency": "USD"
        },
        "image": "https://example.com/product1.jpg",
        "description": "A test product for Shopify extraction."
    }
    </script>
</head>
<body>
    <div class="product-card">
        <h2 class="product-card__title">Test Product 2</h2>
        <span class="product-price"><span class="price">$49.99</span></span>
        <img src="https://example.com/product2.jpg" alt="Product 2">
    </div>
    <div class="product-card">
        <h2 class="product-card__title">Test Product 3</h2>
        <span class="product-price"><span class="price">$19.99</span></span>
        <img src="https://example.com/product3.jpg" alt="Product 3">
    </div>
</body>
</html>
