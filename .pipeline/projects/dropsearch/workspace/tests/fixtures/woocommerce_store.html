<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test WooCommerce Store</title>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Woo Product 1",
        "offers": {
            "@type": "Offer",
            "price": "39.99",
            "priceCurrency": "USD"
        },
        "image": "https://example.com/woo1.jpg",
        "description": "A test product for WooCommerce extraction."
    }
    </script>
</head>
<body class="woocommerce">
    <ul class="products">
        <li class="product">
            <a class="woocommerce-loop-product__link">
                <h2 class="woocommerce-loop-product__title">Woo Product 2</h2>
            </a>
            <span class="price"><span class="woocommerce-Price-amount">$59.99</span></span>
            <img src="https://example.com/woo2.jpg" alt="Woo Product 2">
        </li>
        <li class="product">
            <a class="woocommerce-loop-product__link">
                <h2 class="woocommerce-loop-product__title">Woo Product 3</h2>
            </a>
            <span class="price"><span class="woocommerce-Price-amount">$24.99</span></span>
            <img src="https://example.com/woo3.jpg" alt="Woo Product 3">
        </li>
    </ul>
</body>
</html>
