# Email Tool — Daemon Configuration
# This config controls the background sync daemon.

daemon:
  # Sync interval in seconds (default: 300 = 5 minutes)
  interval: 300

  # PID file location
  pid_file: /tmp/email-tool-daemon.pid

  # Log file (use "stdout" for console output)
  log_file: /var/log/email-tool/daemon.log

  # Maximum retries on connection failure
  max_retries: 3

  # Retry backoff in seconds
  retry_backoff: 30

# Source configuration
sources:
  - name: "primary-inbox"
    type: imap
    host: imap.gmail.com
    port: 993
    ssl: true
    username: "${EMAIL_USER}"
    password: "${EMAIL_PASS}"
    folders:
      - INBOX
      - "[Gmail]/Sent Mail"

# Rules file to apply during sync
rules_file: ./rules.yaml

# Output configuration
output:
  base_path: ./archive
  format: eml
  collision_strategy: rename

# Notifications (optional)
notifications:
  enabled: false
  # webhook_url: "https://hooks.slack.com/services/..."
  # notify_on: [error, rule_match]
