<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Forensic Suite{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1>🔍 Forensic Suite</h1>
        </div>
        <ul class="nav-links">
            <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a></li>
            <li><a href="/fraud-scores" class="{% if request.path == '/fraud-scores' %}active{% endif %}">Fraud Scores</a></li>
            <li><a href="/red-flags" class="{% if request.path == '/red-flags' %}active{% endif %}">Red Flags</a></li>
            <li><a href="/capital-flows" class="{% if request.path == '/capital-flows' %}active{% endif %}">Capital Flows</a></li>
            <li><a href="/companies" class="{% if request.path == '/companies' %}active{% endif %}">Companies</a></li>
        </ul>
    </nav>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
