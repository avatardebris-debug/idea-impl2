[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "json-schema-profiler"
version = "0.1.0"
description = "A CLI tool that scans JSON datasets, infers schemas, detects anomalies, and outputs standardized validation rules."
requires-python = ">=3.10"
dependencies = [
    "typer>=0.9.0",
    "jsonschema>=4.20.0",
]

[project.scripts]
json-schema-profiler = "json_schema_profiler.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
