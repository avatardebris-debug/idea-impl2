[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "json_skill"
version = "0.1.0"
description = "Enable local AI to run Claude skills as JSON files"
requires-python = ">=3.8"

[tool.setuptools.packages.find]
include = ["json_skill*"]
