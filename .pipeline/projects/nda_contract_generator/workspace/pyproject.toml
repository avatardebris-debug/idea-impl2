[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "nda-contract-generator"
version = "0.1.0"
description = "A CLI tool that drafts jurisdiction-specific non-disclosure agreements using customizable clauses."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "jinja2>=3.1.0",
    "reportlab>=4.0.0",
    "python-docx>=0.8.11",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[project.scripts]
nda = "nda_contract_generator.cli.main:main"

[tool.setuptools.packages.find]
include = ["nda_contract_generator*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
