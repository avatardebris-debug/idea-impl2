[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "observability_dashboard"
version = "0.1.0"
description = "Real-time visualization of agent execution"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
observability_dashboard = "observability_dashboard.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["observability_dashboard*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
