[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "osint-corp"
version = "0.1.0"
description = "OSINT for corporate tracking via public data sources"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
    "rich>=13.0",
    "typer>=0.12",
]

[project.scripts]
osint-corp = "osint_corp.cli:main"

[tool.setuptools.packages.find]
include = ["osint_corp*"]
