[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pantrychef-core"
version = "0.1.0"
description = "PantryChef Meal Planner — Core engine for pantry ingestion, recipe matching, and meal planning"
requires-python = ">=3.10"
dependencies = [
    "click>=8.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.scripts]
pantrychef = "pantrychef_core.cli:cli"

[tool.setuptools.packages.find]
include = ["pantrychef_core*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=pantrychef_core --cov-fail-under=70"
