[project]
name = "pipeline_observability_dashboard"
version = "0.1.0"
description = "Real-time visualization of agent execution, costs, and failure rates."
requires-python = ">=3.9"
dependencies = [
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
