[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "player-attribute-library"
version = "1.0.0"
description = "Library for creating, querying, and matching football player attribute profiles."
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
pal = "player_attribute_library.scripts.cli:main"

[tool.setuptools.packages.find]
include = ["player_attribute_library*"]
