[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "podcast"
version = "0.1.0"
description = "Extract lessons from podcast episodes (audio → transcript → LLM → structured notes)"
requires-python = ">=3.10"
dependencies = []  # stdlib only; faster-whisper optional

[project.optional-dependencies]
whisper = ["faster-whisper>=1.0.0"]
dev = ["pytest>=8.0"]

[project.scripts]
podcast = "podcast.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["podcast*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
