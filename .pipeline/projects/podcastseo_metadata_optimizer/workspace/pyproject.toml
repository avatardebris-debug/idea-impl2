[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "podcastseo"
version = "0.1.0"
description = "PodcastSEO Metadata Optimizer — extracts keywords from podcast transcripts and generates SEO-optimized metadata"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "spacy>=3.7",
    "scikit-learn>=1.3",
    "typer>=0.9",
    "pyyaml>=6.0",
    "python-docx>=0.8",
    "webvtt-py>=0.5",
    "srt>=3.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.scripts]
podcastseo = "podcastseo.cli:app"

[tool.setuptools.packages.find]
include = ["podcastseo*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
