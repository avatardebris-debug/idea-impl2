env:
  episode_length: 30
  n_competitors: 5
  n_consumers: 1000
  initial_budget: 1000.0
  max_inventory: 100

market:
  base_conversion_rate: 0.05
  ad_effectiveness: 0.5
  competition_intensity: 0.3

training:
  n_episodes: 1000
  learning_rate: 0.001
  discount_factor: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 0.995

research:
  min_composite_score: 0.0
  top_n_products: 20
  mock_seed: 42

baseline:
  markup_multiplier: 2.5
  facebook_budget_pct: 0.3
  google_budget_pct: 0.7
  demand_threshold: 0.3

logging:
  level: INFO
  log_interval: 10
  save_interval: 100
  log_dir: "./logs"
