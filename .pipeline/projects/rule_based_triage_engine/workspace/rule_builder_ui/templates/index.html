<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rule Builder — Triage Engine</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Rules</h2>
                <button class="btn btn-primary btn-sm" id="btn-new-rule">+ New Rule</button>
            </div>
            <div class="rule-list" id="rule-list">
                <!-- Rules populated by JS -->
            </div>
            <div class="sidebar-footer">
                <button class="btn btn-secondary btn-sm" id="btn-import">Import JSON</button>
                <button class="btn btn-secondary btn-sm" id="btn-export">Export JSON</button>
            </div>
        </aside>

        <!-- Main Editor Panel -->
        <main class="editor-panel" id="editor-panel">
            <div class="editor-header">
                <h2 id="editor-title">Rule Editor</h2>
                <div class="editor-actions">
                    <button class="btn btn-secondary btn-sm" id="btn-duplicate" disabled>Duplicate</button>
                    <button class="btn btn-danger btn-sm" id="btn-delete" disabled>Delete</button>
                    <button class="btn btn-primary btn-sm" id="btn-save" disabled>Save</button>
                </div>
            </div>

            <div class="editor-body" id="editor-body">
                <!-- Rule Name -->
                <div class="form-group">
                    <label for="rule-name">Rule Name</label>
                    <input type="text" id="rule-name" placeholder="Enter rule name...">
                    <span class="error-msg" id="error-name"></span>
                </div>

                <!-- Priority -->
                <div class="form-group">
                    <label for="rule-priority">Priority: <span id="priority-value">50</span></label>
                    <input type="range" id="rule-priority" min="0" max="100" value="50">
                </div>

                <!-- Enabled Toggle -->
                <div class="form-group toggle-group">
                    <label for="rule-enabled">Enabled</label>
                    <label class="toggle">
                        <input type="checkbox" id="rule-enabled" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <!-- Conditions -->
                <div class="form-group">
                    <div class="form-group-header">
                        <label>Conditions</label>
                        <button class="btn btn-secondary btn-xs" id="btn-add-condition">+ Add Condition</button>
                    </div>
                    <div class="error-msg" id="error-conditions"></div>
                    <div id="conditions-list">
                        <!-- Conditions populated by JS -->
                    </div>
                </div>

                <!-- Actions -->
                <div class="form-group">
                    <div class="form-group-header">
                        <label>Actions</label>
                        <button class="btn btn-secondary btn-xs" id="btn-add-action">+ Add Action</button>
                    </div>
                    <div class="error-msg" id="error-actions"></div>
                    <div id="actions-list">
                        <!-- Actions populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Empty state -->
            <div class="empty-state" id="empty-state">
                <p>Select a rule to edit or create a new one.</p>
            </div>
        </main>
    </div>

    <!-- Import Modal -->
    <div class="modal" id="import-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Import Rules</h3>
                <button class="modal-close" id="btn-close-import">&times;</button>
            </div>
            <textarea id="import-textarea" placeholder="Paste JSON rules here..."></textarea>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btn-cancel-import">Cancel</button>
                <button class="btn btn-primary" id="btn-confirm-import">Import</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
