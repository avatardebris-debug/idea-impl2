[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sacbot"
version = "0.1.0"
description = "Generate content in Scott Adams' distinctive writing style"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "openai>=1.0.0",
    "tiktoken>=0.5.0",
    "click>=8.1.0",
    "pandas>=2.0.0",
    "textstat>=0.7.0",
    "nltk>=3.8.0",
    "vaderSentiment>=3.1.0",
    "rouge-score>=0.1.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[project.scripts]
sacbot = "sacbot.cli:main"

[tool.setuptools.packages.find]
include = ["sacbot*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
