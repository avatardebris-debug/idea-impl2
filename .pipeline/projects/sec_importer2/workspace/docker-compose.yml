version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DB_PATH=/data/sec_importer.db
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=*
      - MAX_LIMIT=500
      - DEFAULT_LIMIT=50
      - CACHE_TTL_SECONDS=300
      - RATE_LIMIT_PER_MINUTE=60
    volumes:
      - db_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  db_data:
