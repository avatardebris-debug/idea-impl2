[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sec-importer"
version = "0.1.0"
description = "SEC filing data importer — fetch, parse, and store structured data from SEC filings"
requires-python = ">=3.10"
dependencies = [
    "sqlalchemy>=2.0",
    "click>=8.0",
    "httpx>=0.27",
    "beautifulsoup4>=4.12",
]

[project.scripts]
sec-importer = "sec_importer.cli:cli"

[tool.setuptools.packages.find]
include = ["sec_importer*"]
