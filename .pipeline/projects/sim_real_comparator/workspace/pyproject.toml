[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sim_real_comparator"
version = "0.1.0"
description = "Multi-metric similarity comparison between real and simulated videos"
requires-python = ">=3.10"
dependencies = [
    "imageio",
    "scikit-image",
    "imagehash",
    "click",
    "pydantic",
    "numpy",
    "openai-clip",
    "torch",
    "matplotlib",
    "Pillow",
]

[project.scripts]
sim-compare = "sim_real_comparator.cli:cli"

[tool.setuptools.packages.find]
where = ["src"]
