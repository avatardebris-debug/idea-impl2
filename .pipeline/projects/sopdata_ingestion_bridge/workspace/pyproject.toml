[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sopdata-ingestion-bridge"
version = "0.1.0"
description = "Bridge API that converts CSV outputs from the CSV Analyzer into structured SOP inputs for the drop-servicing tool."
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0", "mypy>=1.0"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true

[project.scripts]
sopdata-ingestion-bridge = "sopdata_ingestion_bridge.__main__:main"

[tool.setuptools.packages.find]
include = ["sopdata_ingestion_bridge*"]
