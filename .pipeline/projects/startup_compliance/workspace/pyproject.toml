[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "startup_compliance"
version = "0.1.0"
description = "Automated SOC2 and GDPR checklist generator"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
startup_compliance = "startup_compliance.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["startup_compliance*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
