# Classification rules for SupportAgent
# Each category has keywords (case-insensitive) and a base urgency.
# Priority score is computed from urgency + keyword match count.

categories:
  billing:
    keywords:
      - "bill"
      - "billing"
      - "invoice"
      - "payment"
      - "charge"
      - "charged"
      - "credit card"
      - "subscription"
      - "renewal"
      - "plan"
      - "upgrade"
      - "downgrade"
      - "price"
      - "pricing"
      - "cost"
      - "fee"
      - "receipt"
      - "refund"
      - "overcharge"
    base_urgency: medium
    priority_base: 4

  technical:
    keywords:
      - "bug"
      - "error"
      - "crash"
      - "not working"
      - "broken"
      - "issue"
      - "problem"
      - "fix"
      - "troubleshoot"
      - "login"
      - "password"
      - "access"
      - "permission"
      - "api"
      - "integration"
      - "connect"
      - "connection"
      - "timeout"
      - "slow"
      - "performance"
      - "load"
      - "data"
      - "sync"
      - "export"
      - "import"
    base_urgency: medium
    priority_base: 4

  account:
    keywords:
      - "account"
      - "profile"
      - "settings"
      - "delete account"
      - "deactivate"
      - "activate"
      - "verify"
      - "verification"
      - "two factor"
      - "2fa"
      - "mfa"
      - "username"
      - "email change"
      - "update email"
      - "update profile"
    base_urgency: low
    priority_base: 2

  general:
    keywords:
      - "hello"
      - "hi"
      - "help"
      - "question"
      - "info"
      - "information"
      - "general"
      - "other"
      - "misc"
    base_urgency: low
    priority_base: 1

  urgent:
    keywords:
      - "urgent"
      - "emergency"
      - "critical"
      - "asap"
      - "immediately"
      - "down"
      - "outage"
      - "downtime"
      - "production"
      - "data loss"
      - "security"
      - "breach"
      - "hack"
      - "compromised"
    base_urgency: high
    priority_base: 7
