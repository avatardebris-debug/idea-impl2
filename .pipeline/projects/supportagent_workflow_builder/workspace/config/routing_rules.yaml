# SOP router configuration
# Maps categories to teams, escalation rules, and SLA targets.

teams:
  billing_team:
    label: "Billing & Payments"
    email: "billing@company.com"
    slack_channel: "#billing-support"
    categories:
      - billing

  technical_team:
    label: "Technical Support"
    email: "tech@company.com"
    slack_channel: "#tech-support"
    categories:
      - technical

  account_team:
    label: "Account Management"
    email: "accounts@company.com"
    slack_channel: "#account-support"
    categories:
      - account

  escalation_team:
    label: "Escalation & Executive"
    email: "escalation@company.com"
    slack_channel: "#escalations"
    categories:
      - urgent

  general_team:
    label: "General Support"
    email: "general@company.com"
    slack_channel: "#general-support"
    categories:
      - general

escalation_rules:
  # Auto-escalate if priority_score >= threshold
  high_priority:
    threshold: 8
    action: "notify_escalation_team"
    notify_slack: true
    notify_email: true

  # Escalate if not resolved within SLA hours
  sla_breach:
    sla_hours:
      urgent: 1
      high: 4
      medium: 24
      low: 72
    action: "notify_team_lead"
    notify_slack: true

routing:
  # Priority-based routing
  priority_routing:
    9-10: "escalation_team"
    7-8: "technical_team"
    5-6: "billing_team"
    3-4: "general_team"
    1-2: "general_team"
