[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "supportagent"
version = "0.1.0"
description = "SupportAgent Workflow Builder — Automated customer support ticket routing, triage, and draft response generation."
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
    "fastapi>=0.104.0",
    "uvicorn>=0.24.0",
    "jinja2>=3.1.2",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "httpx>=0.25.0",
    "pytest-cov>=4.1.0",
]

[project.scripts]
supportagent = "supportagent.cli:main"

[tool.setuptools.packages.find]
include = ["supportagent*"]
