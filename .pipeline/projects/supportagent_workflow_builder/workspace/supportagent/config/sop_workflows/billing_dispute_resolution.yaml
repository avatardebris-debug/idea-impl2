# SOP Workflow: Billing Dispute Resolution
# Handles billing-related tickets with specific escalation paths.

name: billing_dispute_resolution
description: "Workflow for handling billing disputes and payment issues."

steps:
  - id: step_1
    type: action
    action: classify_ticket
    params: {}
    condition: null
    then_step: step_2
    else_step: null

  - id: step_2
    type: action
    action: assign_team
    params:
      team: "billing_team"
    condition: null
    then_step: step_3
    else_step: null

  - id: step_3
    type: condition
    action: null
    params: {}
    condition:
      field: "priority_score"
      operator: ">="
      value: 7
    then_step: step_4
    else_step: step_5

  - id: step_4
    type: action
    action: escalate
    params:
      target_team: "billing_team"
      reason: "high_value_dispute"
    condition: null
    then_step: step_6
    else_step: null

  - id: step_5
    type: action
    action: generate_draft
    params:
      template: "billing_response"
      tone: "empathetic"
    condition: null
    then_step: step_6
    else_step: null

  - id: step_6
    type: gate
    action: null
    params:
      gate_type: "human_review"
      required_roles: ["billing_agent"]
    condition: null
    then_step: null
    else_step: null
