# Billing workflow — handles billing and payment tickets
name: billing_flow
version: "1.0"
description: "Standard workflow for billing-related tickets"

steps:
  - id: step_1
    type: action
    action: classify_ticket
    description: "Classify the ticket using keyword rules"

  - id: step_2
    type: condition
    condition:
      field: priority_score
      operator: ">="
      value: 7
    then: step_3a
    else: step_3b

  - id: step_3a
    type: action
    action: escalate
    description: "Escalate high-priority billing tickets"
    params:
      target_team: escalation_team
      reason: "high_priority_billing"

  - id: step_3b
    type: action
    action: assign_team
    description: "Assign to billing team"
    params:
      team: billing_team

  - id: step_4
    type: action
    action: generate_draft
    description: "Generate a draft response"
    params:
      template: billing_response
      tone: professional

  - id: step_5
    type: gate
    gate_type: human_approval
    description: "Await human approval before sending"
    auto_approve_after_hours: 24

  - id: step_6
    type: action
    action: send_response
    description: "Send the approved response to the customer"
