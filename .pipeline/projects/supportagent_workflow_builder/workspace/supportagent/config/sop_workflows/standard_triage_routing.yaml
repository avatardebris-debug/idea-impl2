# SOP Workflow: Standard Triage and Routing
# Handles incoming tickets through classification, routing, and response generation.

name: standard_triage_routing
description: "Standard workflow for triaging and routing incoming support tickets."

steps:
  - id: step_1
    type: action
    action: classify_ticket
    params: {}
    condition: null
    then_step: step_2
    else_step: null

  - id: step_2
    type: action
    action: assign_team
    params:
      team: "auto"
    condition: null
    then_step: step_3
    else_step: null

  - id: step_3
    type: condition
    action: null
    params: {}
    condition:
      field: "priority_score"
      operator: ">="
      value: 8
    then_step: step_4
    else_step: step_5

  - id: step_4
    type: action
    action: escalate
    params:
      target_team: "escalation_team"
      reason: "high_priority"
    condition: null
    then_step: step_6
    else_step: null

  - id: step_5
    type: action
    action: generate_draft
    params:
      template: "general_response"
      tone: "professional"
    condition: null
    then_step: step_6
    else_step: null

  - id: step_6
    type: gate
    action: null
    params:
      gate_type: "human_review"
      required_roles: ["agent"]
    condition: null
    then_step: null
    else_step: null
