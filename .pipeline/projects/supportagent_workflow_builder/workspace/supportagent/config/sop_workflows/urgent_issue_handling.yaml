# SOP Workflow: Urgent Issue Handling
# Handles urgent/critical tickets with immediate escalation.

name: urgent_issue_handling
description: "Workflow for handling urgent and critical support tickets."

steps:
  - id: step_1
    type: action
    action: classify_ticket
    params: {}
    condition: null
    then_step: step_2
    else_step: null

  - id: step_2
    type: condition
    action: null
    params: {}
    condition:
      field: "priority_score"
      operator: ">="
      value: 8
    then_step: step_3
    else_step: step_5

  - id: step_3
    type: action
    action: escalate
    params:
      target_team: "escalation_team"
      reason: "urgent_issue"
    condition: null
    then_step: step_4
    else_step: null

  - id: step_4
    type: action
    action: notify
    params:
      channels: ["slack", "email"]
      recipients: ["escalation_team", "team_lead"]
    condition: null
    then_step: step_6
    else_step: null

  - id: step_5
    type: action
    action: assign_team
    params:
      team: "technical_team"
    condition: null
    then_step: step_6
    else_step: null

  - id: step_6
    type: gate
    action: null
    params:
      gate_type: "immediate_response"
      required_roles: ["agent"]
    condition: null
    then_step: null
    else_step: null
