templates:
  general_response: |
    {subject}
    
    Ticket ID: {ticket_id}
    Category: {category}
    Priority: {priority}
    
    Thank you for reaching out. We have received your request regarding "{body}".
    
    Our team is reviewing your case and will get back to you shortly.
    
    If you have any additional information to share, please reply to this message.
    
    Ticket created: {created_at}
  billing_response: |
    {subject}
    
    Ticket ID: {ticket_id}
    Category: billing
    Priority: {priority}
    
    Thank you for contacting our billing team regarding "{body}".
    
    We take billing matters seriously and are reviewing your account to resolve this issue promptly.
    
    A billing specialist will follow up with you within 24 hours.
    
    Ticket created: {created_at}
  account_response: |
    {subject}
    
    Ticket ID: {ticket_id}
    Category: account
    Priority: {priority}
    
    Thank you for reaching out about your account. We have received your request regarding "{body}".
    
    Our account team is reviewing your request and will take the necessary steps to assist you.
    
    You can expect a follow-up within 1-2 business days.
    
    Ticket created: {created_at}
  escalation_response: |
    {subject}
    
    Ticket ID: {ticket_id}
    Category: escalation
    Priority: {priority}
    
    Thank you for bringing this matter to our attention. We understand the urgency of "{body}".
    
    Your ticket has been escalated to our senior support team for immediate review.
    
    A senior specialist will contact you within 4 hours during business hours.
    
    Ticket created: {created_at}
