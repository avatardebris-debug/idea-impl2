# Tone styles for response generation
# Defines tone, greeting, closing, and language for each team and customer tier.

tone_styles:
  billing_team:
    enterprise:
      tone: "formal"
      greeting: "Dear"
      closing: "Sincerely"
      language: "en"
    startup:
      tone: "professional"
      greeting: "Hello"
      closing: "Best regards"
      language: "en"
