# Triage engine configuration
# Controls sentiment analysis, priority scoring, and ML classification.

sentiment_weights:
  positive: 1.0
  negative: 1.0
  angry: 2.0

priority_weights:
  urgency:
    low: 1
    medium: 3
    high: 5
    critical: 8
  sentiment:
    positive: 0
    neutral: 0
    negative: 1
    angry: 3
  category:
    urgent: 5
    billing: 3
    technical: 3
    account: 1
    general: 0
  text_length:
    short: 0
    medium: 1
    long: 2

ml_classification:
  enabled: true
  similarity_threshold: 0.3
  method: "cosine_similarity"
