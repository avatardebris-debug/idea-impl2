[project]
name = "test_coverage_mutator"
version = "0.1.0"
description = "Automated suite that generates mutation tests and enforces quality thresholds."
requires-python = ">=3.9"
dependencies = [
    "typer>=0.9.0",
    "mutmut>=2.4.4"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
