[project]
name = "test_fixture_generator"
version = "0.1.0"
description = "Generates realistic test fixtures (CSV, JSON, Mock responses) for pipeline projects."
requires-python = ">=3.9"
dependencies = [
    "typer>=0.9.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
