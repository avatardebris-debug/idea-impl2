# Heterogeneous cluster batch config
# Launches mixed GPU types: 2x A100 and 4x RTX 4090 with staggered timing.

name: "heterogeneous-cluster"

presets:
  - preset_path: "presets/training-gpu.yaml"
    count: 2
  - preset_path: "presets/default.yaml"
    count: 4

timing:
  delay_seconds: 15
  stagger_percent: 10

concurrency: 2
timeout: 7200
