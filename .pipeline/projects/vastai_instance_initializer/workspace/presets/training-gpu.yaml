# Training GPU preset for VAST.ai instance launch
# Optimized for deep learning training workloads with high-memory GPUs.

# Required fields
name: "training-gpu"            # Name for this instance
gpu_type: "NVIDIA A100"         # High-memory GPU for training
price_cap: "3.00"               # Maximum price per hour in USD
storage: "500GB"                # Large storage for datasets
image: "nvidia/cuda:12.2.0-devel-ubuntu22.04"  # CUDA development image

# Optional fields
ssh_commands:                   # Post-launch setup commands
  - "apt-get update && apt-get install -y python3-pip git"
  - "pip install torch torchvision torchaudio"
  - "pip install transformers datasets"

env_vars:                       # Environment variables
  CUDA_VISIBLE_DEVICES: "0,1,2,3"
  PYTHONUNBUFFERED: "1"
  NCCL_DEBUG: "INFO"

disk_size: 500                  # Total disk size in GB
region: null                    # Any region
min_vram: 40                    # Minimum 40GB VRAM for A100
uptime: "4h"                    # 4 hour maximum uptime
ssh_public_key: null            # Will use auto-generated key
docker_args:                    # Docker configuration for training
  --shm-size: "32g"
  --ulimit: "nofile=65535"
  --gpus: "all"

ports:                          # Ports to expose
  - 22                          # SSH
  - 8888                        # Jupyter
  - 6006                        # TensorBoard

labels:                         # Instance labels
  project: "vastai-init"
  environment: "training"
  workload: "deep-learning"

# Polling configuration
timeout: 600                    # Longer timeout for A100 instances
poll_interval: 15               # Check every 15 seconds
