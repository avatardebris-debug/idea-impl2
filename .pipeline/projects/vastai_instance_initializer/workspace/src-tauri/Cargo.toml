[package]
name = "vastai-instance-manager"
version = "0.1.0"
description = "VAST AI Instance Manager"
authors = ["VAST AI Manager Team"]
license = "MIT"
repository = ""
default-run = "vastai-instance-manager"
edition = "2021"
rust-version = "1.75"

[[bin]]
name = "vastai-instance-manager"
path = "src/main.rs"

[dependencies]
tauri = { version = "1", features = ["shell-open"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.11", features = ["json"] }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
rand = "0.8"
regex = "1"
flate2 = "1"
tar = "0.4"
walkdir = "2"
anyhow = "1"
thiserror = "1"
futures = "0.3"
async-trait = "0.1"
base64 = "0.21"
sha2 = "0.10"

[build-dependencies]
tauri-build = { version = "1", features = [] }
