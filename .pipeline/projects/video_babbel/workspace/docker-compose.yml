version: "3.8"

services:
  video-babbel:
    build:
      context: .
      dockerfile: Dockerfile
    image: video-babbel:latest
    container_name: video-babbel
    volumes:
      # Mount a local directory containing videos to process
      - ./videos:/home/video/videos:ro
      # Mount a local directory for output files
      - ./output:/home/video/output
    environment:
      # Optional: set your DeepL API key if using the deepL backend
      # DEEPL_API_KEY: your-key-here
      # Optional: set the default target language
      VIDEO_BABBEL_DEFAULT_LANG: "es"
    # Run the CLI with default help; override with `docker compose run video-babbel process ...`
    command: ["--help"]
    user: video
