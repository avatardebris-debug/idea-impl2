[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "video-babbel"
version = "0.1.0"
description = "Video translation and summarization pipeline"
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "openai-whisper>=20230314",
    "googletrans==4.0.0-rc1",
    "deepl>=1.14.0",
    "ffmpeg-python>=0.2.0",
    "torch>=2.0.0",
]

[project.scripts]
video-babbel = "video_babbel.cli:cli"

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-mock>=3.10.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "mypy>=1.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.black]
line-length = 88
target-version = ["py38"]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
