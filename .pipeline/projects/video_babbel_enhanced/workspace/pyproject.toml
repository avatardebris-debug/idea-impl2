[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "video-babbel-enhanced"
version = "0.1.0"
description = "Frequency-ordered language learning clips from any video"
requires-python = ">=3.10"
dependencies = [
    "faster-whisper>=1.0.0",
    "requests>=2.31.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov"]

[project.scripts]
video-babbel = "video_babbel_enhanced.cli:main"
drill = "video_babbel_enhanced.drill_cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["video_babbel_enhanced*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
