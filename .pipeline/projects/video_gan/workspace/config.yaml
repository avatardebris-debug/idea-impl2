# VideoGAN Configuration
# This file controls all training and inference parameters.

# ── Training ──
training:
  epochs: 10
  batch_size: 4
  lr_g: 0.0002
  lr_d: 0.0002
  beta1: 0.5
  device: "cpu"  # "cpu" or "cuda"
  output_dir: "outputs"
  save_interval: 5

# ── Generator ──
generator:
  input_channels: 3
  latent_dim: 128
  num_frames: 16
  frame_size: 64
  output_channels: 3

# ── Discriminator ──
discriminator:
  input_channels: 3
  num_frames: 16
  frame_size: 64

# ── Video Processor ──
video_processor:
  frame_size: [64, 64]
  num_frames: 16
  channels: 3
  normalize: true
  fps: 10.0

# ── Inference ──
inference:
  num_samples: 10
  batch_size: 1
  fps: 10.0

# ── API ──
api:
  host: "0.0.0.0"
  port: 8000
  reload: true

# ── Logging ──
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
