# VideoGAN Docker Compose
# Usage: docker-compose up -d

version: '3.8'

services:
  # ── API Service ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - DEVICE=cuda  # Change to "cpu" if no GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Training Service ──────────────────────────────────────
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
    command: python train.py --config /app/config.yaml
    volumes:
      - ./outputs:/app/outputs
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: "no"

  # ── Inference Service ─────────────────────────────────────
  inference:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m video_gan.api
    ports:
      - "8001:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
