# docker-compose.yml for video_langfake
#
# Usage:
#   docker-compose up          # start API server
#   docker-compose run --rm cli translate input.mp4 es output.mp4
#   docker-compose run --rm cli languages

version: "3.8"

services:
  api:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./videos:/app/videos:ro
      - ./output:/app/output
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=false
    restart: unless-stopped

  cli:
    build: .
    volumes:
      - ./videos:/app/videos:ro
      - ./output:/app/output
    # Override command to run CLI commands
    # docker-compose run --rm cli translate input.mp4 es output.mp4
    # docker-compose run --rm cli detect-language input.mp4
    # docker-compose run --rm cli info input.mp4
    # docker-compose run --rm cli languages
