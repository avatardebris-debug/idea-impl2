slug: registry_refresh_n8n
title: Registry refresh via n8n (replacement mode template)
kind: workflow
status: draft
backend: n8n
purpose: |
  Delegates execution to self-hosted n8n. Import registry_refresh_n8n.json
  into n8n, activate, then set n8n.webhook_path below to match your webhook URL path.
domains:
  - devops
requires: []

n8n:
  base_url: "${N8N_BASE_URL:-http://localhost:5678}"
  webhook_path: "/webhook/registry-refresh"
  workflow_id: ""
  api_key_env: N8N_API_KEY

steps:
  - id: placeholder
    type: shell
    command: python scripts/build_capability_registry.py
    save_as: native_fallback_note
